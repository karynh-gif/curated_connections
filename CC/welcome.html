<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Curated Connections™</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#060c09;overflow:hidden;-webkit-font-smoothing:antialiased;}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 30% 30%,rgba(201,125,58,.1) 0%,transparent 55%),
    radial-gradient(ellipse at 70% 70%,rgba(107,60,162,.07) 0%,transparent 50%);
  pointer-events:none;
}

/* grain */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  background-size:160px;pointer-events:none;z-index:0;opacity:.4;
}

/* particles */
.p{position:fixed;border-radius:50%;pointer-events:none;animation:glow var(--d,4s) var(--del,0s) ease-in-out infinite;}
@keyframes glow{0%,100%{opacity:.15;}50%{opacity:.5;}}

.wrap{
  position:relative;z-index:1;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:3rem 2rem;
  gap:0;
}

/* TITLE */
.title{
  font-family:'Pacifico',cursive;
  font-size:clamp(2.2rem,8vw,3.8rem);
  color:#c97d3a;
  text-shadow:0 0 60px rgba(201,125,58,.35),0 0 120px rgba(201,125,58,.15);
  line-height:1.15;
  opacity:0;
  animation:rise .9s .2s cubic-bezier(.22,1,.36,1) both;
}

/* TAGLINE */
.tagline{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-weight:300;
  font-size:clamp(1rem,3vw,1.3rem);
  color:rgba(242,232,216,.45);
  margin-top:1rem;
  letter-spacing:.06em;
  line-height:1.7;
  opacity:0;
  animation:rise .8s .6s cubic-bezier(.22,1,.36,1) both;
}

/* RULE */
.rule{
  width:32px;height:1px;
  background:rgba(201,125,58,.3);
  margin:1.8rem auto;
  opacity:0;
  animation:rise .6s .9s ease both;
}

/* SPACES */
.spaces{
  display:flex;flex-direction:column;gap:.4rem;
  opacity:0;
  animation:rise .7s 1s cubic-bezier(.22,1,.36,1) both;
}

.sp{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-weight:300;
  font-size:clamp(1rem,3vw,1.2rem);
  color:rgba(242,232,216,.5);
  letter-spacing:.04em;
  transition:color .2s;
}

/* ENTER BUTTON */
.enter{
  margin-top:2.2rem;
  opacity:0;
  animation:rise .7s 1.5s cubic-bezier(.22,1,.36,1) both;
}

.btn{
  display:inline-block;
  padding:.85rem 2.4rem;
  background:linear-gradient(135deg,#c97d3a,#e89448);
  border:none;border-radius:999px;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:1.05rem;font-weight:400;
  color:#fff;letter-spacing:.05em;cursor:pointer;
  box-shadow:0 6px 28px rgba(201,125,58,.4);
  transition:all .22s;
  text-decoration:none;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(201,125,58,.5);}

.skip{
  display:block;margin-top:.8rem;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:.8rem;
  color:rgba(242,232,216,.2);cursor:pointer;
  background:none;border:none;
  transition:color .2s;
}
.skip:hover{color:rgba(201,125,58,.4);}

@keyframes rise{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

/* Auto-advance progress line */
.progress{
  position:fixed;bottom:0;left:0;
  height:2px;
  background:linear-gradient(90deg,#c97d3a,#e89448);
  width:0%;
  animation:fill 5s 1.8s linear both;
  box-shadow:0 0 8px rgba(201,125,58,.5);
}
@keyframes fill{from{width:0%;}to{width:100%;}}
</style>
</head>
<body>

<div class="p" style="width:5px;height:5px;background:rgba(201,125,58,.5);top:20%;left:18%;--d:3.2s;--del:.2s;box-shadow:0 0 10px 3px rgba(201,125,58,.25);"></div>
<div class="p" style="width:3px;height:3px;background:rgba(107,60,162,.6);top:28%;right:16%;--d:4.1s;--del:.8s;box-shadow:0 0 8px 2px rgba(107,60,162,.3);"></div>
<div class="p" style="width:4px;height:4px;background:rgba(42,138,114,.5);bottom:30%;left:12%;--d:2.9s;--del:1.2s;box-shadow:0 0 9px 2px rgba(42,138,114,.25);"></div>
<div class="p" style="width:3px;height:3px;background:rgba(201,125,58,.35);bottom:22%;right:20%;--d:4.4s;--del:0s;box-shadow:0 0 7px 2px rgba(201,125,58,.2);"></div>

<div class="wrap">
  <div class="title">Curated<br>Connections</div>

  <div class="tagline">
    Four spaces.<br>One ecosystem.
  </div>

  <div class="rule"></div>

  <div class="spaces">
    <div class="sp">Gather & Reflect</div>
    <div class="sp">Circles</div>
    <div class="sp">Game Night</div>
    <div class="sp">Living Legacy</div>
  </div>

  <div class="enter">
    <button class="btn" onclick="go()">Enter Gather →</button>
    <button class="skip" onclick="go()">Skip</button>
  </div>
</div>

<div class="progress" id="prog"></div>

<script>
// Auto-advance after 5 seconds
const timer = setTimeout(go, 6800);

function go() {
  clearTimeout(timer);
  localStorage.setItem('cc_visited','1');
  window.location.href = 'gather.html';
}
</script>
</body>
</html>
