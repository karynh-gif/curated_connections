<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Play Live — Curated Connections</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nunito:wght@400;700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#060c09;--surface:#111d14;--card:#162019;--amber:#c97d3a;--amber2:#e89448;--cream:#f2e8d8;--teal:#2a8a72;--teal2:#3aad90;--r-lg:22px;--r-md:16px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--ink);color:var(--cream);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
.app{max-width:430px;margin:0 auto;height:100svh;display:flex;flex-direction:column;background:var(--ink);position:relative;overflow:hidden;}
.topbar{padding:.9rem 1.1rem .75rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-brand{font-family:'Pacifico',cursive;font-size:1.1rem;color:var(--amber);}
.tb-back{background:none;border:none;color:rgba(242,232,216,.4);font-size:.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
.scroll{flex:1;overflow-y:auto;padding:0 1.1rem 5rem;}

/* SCREENS */
.screen{display:none;flex-direction:column;}
.screen.active{display:flex;}

/* LOBBY */
.lobby-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;font-style:italic;margin:1.5rem 0 .4rem;text-align:center;}
.lobby-sub{font-size:.82rem;color:rgba(242,232,216,.4);text-align:center;font-style:italic;margin-bottom:2rem;}
.lobby-btn{width:100%;padding:1rem;border-radius:999px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.04em;cursor:pointer;border:none;margin-bottom:.75rem;transition:all .2s;}
.btn-primary{background:linear-gradient(135deg,var(--amber),var(--amber2));color:#fff;box-shadow:0 6px 20px rgba(201,125,58,.3);}
.btn-secondary{background:rgba(255,255,255,.05);color:rgba(242,232,216,.7);border:1.5px solid rgba(255,255,255,.1);}
.input-field{width:100%;padding:.85rem 1rem;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r-md);font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--cream);outline:none;margin-bottom:.75rem;text-align:center;letter-spacing:.12em;text-transform:uppercase;}
.input-field::placeholder{text-transform:none;letter-spacing:0;color:rgba(242,232,216,.25);}
.input-label{font-family:'Nunito',sans-serif;font-size:.55rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,125,58,.5);margin-bottom:.4rem;display:block;}

/* WAITING ROOM */
.room-code-display{font-family:'Nunito',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:.2em;color:var(--amber);text-align:center;margin:1.5rem 0;text-shadow:0 0 30px rgba(201,125,58,.3);}
.room-code-label{font-family:'Nunito',sans-serif;font-size:.55rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:rgba(242,232,216,.3);text-align:center;margin-bottom:.5rem;}
.players-list{margin:1.5rem 0;}
.player-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .9rem;background:rgba(255,255,255,.04);border-radius:var(--r-md);margin-bottom:.4rem;}
.player-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--amber),var(--amber2));display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0;}
.player-name{font-size:.9rem;font-weight:500;}
.player-host{font-family:'Nunito',sans-serif;font-size:.5rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-left:auto;}
.waiting-pulse{text-align:center;font-size:.75rem;font-style:italic;color:rgba(242,232,216,.3);animation:pulse 2s ease-in-out infinite;margin:1rem 0;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* GAME PLAY */
.round-badge{font-family:'Nunito',sans-serif;font-size:.55rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,125,58,.5);text-align:center;margin:1rem 0 .5rem;}
.game-card{background:linear-gradient(145deg,#3a1800,#7a3810);border:1px solid rgba(201,125,58,.2);border-radius:var(--r-lg);padding:1.8rem 1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;}
.game-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 15%,rgba(255,255,255,.12),transparent 40%);pointer-events:none;}
.game-card-edition{font-size:.5rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--amber2);margin-bottom:.5rem;}
.game-card-q{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--cream);line-height:1.5;position:relative;z-index:1;}
.game-card-hint{font-size:.75rem;color:rgba(242,232,216,.45);margin-top:.6rem;line-height:1.5;position:relative;z-index:1;}
.answer-box{width:100%;min-height:100px;padding:.9rem 1rem;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r-md);font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--cream);resize:none;outline:none;margin-bottom:.75rem;}
.answer-box:focus{border-color:rgba(201,125,58,.4);}
.players-scores{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0;}
.score-pill{padding:.3rem .8rem;background:rgba(255,255,255,.05);border-radius:999px;font-size:.7rem;display:flex;align-items:center;gap:.4rem;}
.score-name{color:rgba(242,232,216,.6);}
.score-num{font-weight:700;color:var(--amber2);}

.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:rgba(17,29,20,.95);border:1px solid rgba(201,125,58,.25);border-radius:999px;padding:.55rem 1.2rem;font-size:.78rem;color:var(--cream);display:none;white-space:nowrap;z-index:999;}
.toast.show{display:block;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="tb-back" onclick="goBack()">← Back</button>
    <div class="tb-brand">Play Live</div>
    <div style="width:60px"></div>
  </div>

  <div class="scroll">

    <!-- LOBBY -->
    <div class="screen active" id="lobbyScreen">
      <div class="lobby-title">Play together,<br>in real time.</div>
      <div class="lobby-sub">Create a room and share the code. Up to 8 players.</div>

      <button class="lobby-btn btn-primary" onclick="showCreate()">Create a Room →</button>
      <button class="lobby-btn btn-secondary" onclick="showJoin()">Join with a Code</button>

      <div id="createSection" style="display:none;margin-top:.5rem;">
        <span class="input-label">Your name</span>
        <input class="input-field" id="hostName" placeholder="What should we call you?" style="text-transform:none;letter-spacing:0;text-align:left;"/>
        <button class="lobby-btn btn-primary" onclick="createRoom()" style="margin-top:.25rem;">Create Room →</button>
      </div>

      <div id="joinSection" style="display:none;margin-top:.5rem;">
        <span class="input-label">Your name</span>
        <input class="input-field" id="joinName" placeholder="What should we call you?" style="text-transform:none;letter-spacing:0;text-align:left;"/>
        <span class="input-label" style="margin-top:.5rem;">Room code</span>
        <input class="input-field" id="joinCode" placeholder="Enter 5-letter code" maxlength="5"/>
        <button class="lobby-btn btn-primary" onclick="joinRoom()">Join →</button>
      </div>
    </div>

    <!-- WAITING ROOM -->
    <div class="screen" id="waitingScreen">
      <div class="room-code-label">Share this code</div>
      <div class="room-code-display" id="roomCodeDisplay">-----</div>
      <button class="lobby-btn btn-secondary" onclick="copyCode()" style="max-width:200px;margin:0 auto .5rem;">Copy Code</button>

      <div class="players-list" id="playersList"></div>
      <div class="waiting-pulse" id="waitingMsg">Waiting for others to join...</div>

      <button class="lobby-btn btn-primary" id="startBtn" onclick="startGame()" style="display:none;">Start Game →</button>
      <button class="lobby-btn btn-secondary" id="readyBtn" onclick="playerReady()">I'm Ready</button>
    </div>

    <!-- GAME -->
    <div class="screen" id="gameScreen">
      <div class="round-badge" id="roundBadge">Round 1</div>
      <div class="players-scores" id="scoresRow"></div>

      <div class="game-card" id="gameCard">
        <div class="game-card-edition" id="cardEdition">Family Edition</div>
        <div class="game-card-q" id="cardQuestion">Loading next card...</div>
        <div class="game-card-hint" id="cardHint"></div>
      </div>

      <textarea class="answer-box" id="answerBox" placeholder="Your answer..."></textarea>
      <button class="lobby-btn btn-primary" onclick="submitAnswer()">Share My Answer →</button>
      <button class="lobby-btn btn-secondary" id="nextCardBtn" onclick="nextCard()" style="display:none;">Next Card →</button>
      <button class="lobby-btn btn-secondary" onclick="endGame()" style="margin-top:.5rem;opacity:.5;">End Game</button>
    </div>

    <!-- END -->
    <div class="screen" id="endScreen">
      <div class="lobby-title">That was something.</div>
      <div class="lobby-sub">Good questions have a way of staying with you.</div>
      <div class="players-scores" id="finalScores" style="justify-content:center;margin:1.5rem 0;"></div>
      <button class="lobby-btn btn-primary" onclick="resetGame()">Play Again →</button>
      <button class="lobby-btn btn-secondary" onclick="goBack()">Back to Gather</button>
    </div>

  </div>
</div>
<div class="toast" id="toastEl"></div>

<script>
const user = JSON.parse(localStorage.getItem('cc_user') || '{}');
let roomCode = '';
let sessionId = '';
let isHost = false;
let pollInterval = null;
let round = 0;

function goBack() { window.location.href = 'gather.html'; }

function showCreate() {
  document.getElementById('createSection').style.display = 'block';
  document.getElementById('joinSection').style.display = 'none';
}
function showJoin() {
  document.getElementById('joinSection').style.display = 'block';
  document.getElementById('createSection').style.display = 'none';
}

async function callPlayLive(body) {
  const res = await fetch('/api/play-live', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  return res.json();
}

async function createRoom() {
  const name = document.getElementById('hostName').value.trim();
  if (!name) { toast('What should we call you?'); return; }

  toast('Creating room...');
  const data = await callPlayLive({
    action: 'create_room',
    userId: user.uid || 'guest-' + Date.now(),
    userName: name,
    gameType: 'Conversation Cards'
  });

  roomCode = data.roomCode;
  sessionId = data.sessionId;
  isHost = true;

  document.getElementById('roomCodeDisplay').textContent = roomCode;
  showScreen('waitingScreen');
  document.getElementById('startBtn').style.display = 'block';
  renderPlayers([{name, id: user.uid || 'host'}], true);
  startPolling();
}

async function joinRoom() {
  const name = document.getElementById('joinName').value.trim();
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if (!name || !code) { toast('Enter your name and the room code'); return; }

  toast('Joining...');
  const data = await callPlayLive({
    action: 'join_room',
    roomCode: code,
    userId: user.uid || 'guest-' + Date.now(),
    userName: name
  });

  if (data.error) { toast(data.error); return; }

  roomCode = code;
  sessionId = data.sessionId;
  isHost = false;

  document.getElementById('roomCodeDisplay').textContent = roomCode;
  showScreen('waitingScreen');
  renderPlayers(data.players, false);
  startPolling();
}

async function startGame() {
  const data = await callPlayLive({ action: 'start_game', roomCode });
  if (data.currentCard) showCard(data.currentCard, data.round);
  showScreen('gameScreen');
}

async function nextCard() {
  const data = await callPlayLive({ action: 'next_card', roomCode });
  if (data.currentCard) showCard(data.currentCard, data.round);
  document.getElementById('answerBox').value = '';
  document.getElementById('nextCardBtn').style.display = 'none';
}

function submitAnswer() {
  const answer = document.getElementById('answerBox').value.trim();
  if (!answer) { toast('Share your answer first'); return; }
  toast('Answer shared ✦');
  document.getElementById('nextCardBtn').style.display = 'block';
}

async function endGame() {
  await callPlayLive({ action: 'end_game', roomCode });
  if (pollInterval) clearInterval(pollInterval);
  showScreen('endScreen');
}

function playerReady() { toast('Waiting for host to start...'); }

function showCard(card, r) {
  round = r;
  document.getElementById('roundBadge').textContent = 'Round ' + r;
  document.getElementById('cardEdition').textContent = (card.edition || 'Family') + ' Edition';
  document.getElementById('cardQuestion').textContent = '"' + card.prompt + '"';
  document.getElementById('cardHint').textContent = card.hint || '';
}

function renderPlayers(players, isHostView) {
  const list = document.getElementById('playersList');
  list.innerHTML = players.map((p, i) => `
    <div class="player-item">
      <div class="player-av">${(p.name||'?')[0].toUpperCase()}</div>
      <div class="player-name">${p.name}</div>
      ${i === 0 ? '<span class="player-host">Host</span>' : ''}
    </div>
  `).join('');
  if (players.length > 1) {
    document.getElementById('waitingMsg').textContent = players.length + ' players in the room';
  }
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    try {
      const data = await callPlayLive({ action: 'get_state', roomCode });
      if (data.players) renderPlayers(data.players, isHost);
      if (data.status === 'playing' && document.getElementById('waitingScreen').classList.contains('active')) {
        if (data.currentCard) showCard(data.currentCard, data.round);
        showScreen('gameScreen');
      }
      if (data.status === 'ended') {
        clearInterval(pollInterval);
        showScreen('endScreen');
      }
    } catch(e) {}
  }, 3000); // Poll every 3 seconds
}

function copyCode() {
  navigator.clipboard.writeText(roomCode).then(() => toast('Code copied — share it with your people'));
}

function resetGame() { location.reload(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}
</script>
</body>
</html>
